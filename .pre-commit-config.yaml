fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: check-all
        name: check-all (lint, format, types, tests, file length)
        entry: uv run python scripts/check_all.py
        language: system
        types: [python]
        pass_filenames: false
