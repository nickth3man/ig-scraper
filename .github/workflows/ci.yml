name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  UV_CACHE_DIR: /tmp/uv-cache

jobs:
  # Quick checks (fast feedback)
  quick-check:
    name: Quick Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
          enable-cache: true
      
      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: /tmp/uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      
      - name: Install dependencies
        run: uv sync --locked --dev
      
      - name: Fast type check (ty)
        run: uv run ty check src/
      
      - name: Lint (ruff)
        run: uv run ruff check .
      
      - name: Format check
        run: uv run ruff format --check .

  # Slow type checking (comprehensive)
  typecheck:
    name: Type Check (mypy)
    needs: quick-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
          enable-cache: true
      
      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: /tmp/uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      
      - run: uv sync --locked --dev
      - run: uv run mypy src/

  # Test suite (matrix)
  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: quick-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v5
      
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      
      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: /tmp/uv-cache
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-
            uv-${{ runner.os }}-
      
      - run: uv sync --locked --dev
      
      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-report=xml
      
      - name: Check file lengths
        run: uv run python scripts/check_file_length.py
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml

  # Security scanning
  security:
    name: Security Scan
    needs: quick-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
          enable-cache: true
      
      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: /tmp/uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      
      - run: uv sync --locked --dev
      
      - name: Run pip-audit
        run: uv run pip-audit
      
      - name: Run bandit security scan
        run: uv run bandit -r src/ig_scraper -f json -o bandit-report.json || true
      
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # Comprehensive analysis (optional, not blocking)
  analysis:
    name: Code Analysis
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
          enable-cache: true
      
      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: /tmp/uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      
      - run: uv sync --locked --dev
      
      - name: Run prospector analysis
        run: uv run prospector src/ig_scraper || true
