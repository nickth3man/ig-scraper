name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Verify tooling
        run: |
          uv run ruff --version
          uv run mypy --version
          uv run pytest --version

      - name: All checks (lint, format, types, tests, file length)
        run: uv run python scripts/check_all.py

      - name: pip-audit
        run: uv run pip-audit
